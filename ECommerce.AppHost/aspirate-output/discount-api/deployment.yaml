---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discount-api
  labels:
    app: discount-api
spec:
  minReadySeconds: 60
  replicas: 1
  selector:
    matchLabels:
      app: discount-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: discount-api
    spec:
      initContainers:
      - name: migrate
        image: localhost:5000/discount-api:latest
        imagePullPolicy: Always
        args: ["--migrate"]
        envFrom:
        - configMapRef:
            name: discount-api-env
        - secretRef:
            name: ecommerce-secrets
      containers:
      - name: discount-api
        image: localhost:5000/discount-api:latest
        imagePullPolicy: Always
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /alive
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        ports:
        - name: http
          containerPort: 8080
        - name: https
          containerPort: 8443
        envFrom:
        - configMapRef:
            name: discount-api-env
        - secretRef:
            name: ecommerce-secrets
      terminationGracePeriodSeconds: 180
