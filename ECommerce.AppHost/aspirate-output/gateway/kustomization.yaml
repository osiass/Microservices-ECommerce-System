resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: gateway-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES=true
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES=true
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - CATALOG_API_HTTP=http://catalog-api:8080
    - services__catalog-api__http__0=http://catalog-api:8080
    - DISCOUNT_API_HTTP=http://discount-api:8080
    - services__discount-api__http__0=http://discount-api:8080
    - BASKET_API_HTTP=http://basket-api:8080
    - services__basket-api__http__0=http://basket-api:8080
    - IDENTITY_API_HTTP=http://identity-api:8080
    - services__identity-api__http__0=http://identity-api:8080
    - ORDER_API_HTTP=http://order-api:8080
    - services__order-api__http__0=http://order-api:8080
    - PAYMENT_API_HTTP=http://payment-api:8080
    - services__payment-api__http__0=http://payment-api:8080
    - INVENTORY_API_HTTP=http://inventory-api:8080
    - services__inventory-api__http__0=http://inventory-api:8080
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
    - OTEL_SERVICE_NAME=gateway
    - ASPNETCORE_URLS=http://+:8080;
    - ASPNETCORE_ENVIRONMENT=Development





