resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: inventory-api-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES=true
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES=true
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - ConnectionStrings__messaging=amqp://guest:guest@messaging:5672
    - MESSAGING_HOST=messaging
    - MESSAGING_PORT=5672
    - MESSAGING_USERNAME=guest
    - MESSAGING_PASSWORD=guest
    - MESSAGING_URI=amqp://guest:guest@messaging:5672
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
    - OTEL_SERVICE_NAME=inventory-api
    - ASPNETCORE_URLS=http://+:8080;
    - ASPNETCORE_ENVIRONMENT=Development
    - ConnectionStrings__DefaultConnection=Host=inventory-db;Port=5432;Database=InventoryDb;Username=admin;Password=password123








