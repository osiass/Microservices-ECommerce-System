resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: web-ui-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES=true
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES=true
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - GATEWAY_HTTP=http://gateway:8080
    - GatewayExternalUrl=http://localhost:8080
    - services__gateway__http__0=http://gateway:8080
    - CATALOG_API_HTTP=http://catalog-api:8080
    - services__catalog-api__http__0=http://catalog-api:8080
    - BASKET_API_HTTP=http://basket-api:8080
    - services__basket-api__http__0=http://basket-api:8080
    - ORDER_API_HTTP=http://order-api:8080
    - services__order-api__http__0=http://order-api:8080
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
    - OTEL_SERVICE_NAME=web-ui
    - ASPNETCORE_URLS=http://+:8080;
    - ASPNETCORE_ENVIRONMENT=Development





